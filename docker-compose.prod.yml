version: '3.8'

services:
  api:
    command: >
      sh -c "npm run start:prod"
    depends_on:
      - db
    ports:
      - 3000:3000
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_NAME=usersdb
      - POSTGRES_SYNC=true
      - POKEMON_API_URL=https://dragonball-api.com/api/characters
    restart: unless-stopped

  db:
    image: postgres:16.13-alpine3.23
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usersdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
