version: '3.8'

services:
  postgres:
    image: postgres:16.13-alpine3.23
    container_name: postgresNest
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_DB_USER:-angel}"
      POSTGRES_PASSWORD: "${POSTGRES_DB_PASSWORD:-123456a}"
      POSTGRES_DB: "${POSTGRES_DB_DATABASE:-postgres}"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_DB_PORT:-5432}:5432"